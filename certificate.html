<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الشهادة | صيف الابتكار 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--navy:#0B1B3F;--gold:#E7B10A;--cream:#FBF6E9;--ink:#1c2230;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'IBM Plex Sans Arabic',sans-serif;}
  h1,h2,.display{font-family:'Tajawal',sans-serif;}
  main{max-width:640px;margin:30px auto;padding:0 16px 60px;}

  .lookup{background:#fff;border:1px solid #e7ddc0;border-radius:16px;padding:20px;margin-bottom:20px;}
  .lookup input{width:100%;padding:12px;border:1.5px solid #dcd3b8;border-radius:10px;font-size:15px;font-family:inherit;}
  .lookup button{margin-top:10px;width:100%;background:var(--gold);color:var(--navy);border:none;
    border-radius:10px;padding:12px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:15px;cursor:pointer;}

  #certWrap{display:none;}
  #certWrap.show{display:block;}

  .cert{
    position:relative;background:#fffdf7;border:10px solid var(--navy);border-radius:6px;
    padding:44px 34px;text-align:center;overflow:hidden;
  }
  .cert::before{content:"";position:absolute;inset:10px;border:1.5px solid var(--gold);border-radius:2px;pointer-events:none;}
  .cert .eyebrow{color:var(--navy);font-size:13px;font-weight:600;letter-spacing:.5px;}
  .cert h1{font-size:30px;color:var(--navy);margin:6px 0 0;font-weight:900;}
  .cert .gold-rule{width:70px;height:3px;background:var(--gold);margin:14px auto;}
  .cert .grants{font-size:14px;color:#6b7280;margin-top:18px;}
  .cert .name{font-size:28px;font-weight:700;color:var(--navy);margin:10px 0;font-family:'Tajawal',sans-serif;}
  .cert .desc{font-size:14.5px;color:#3a3f4b;line-height:2;max-width:440px;margin:6px auto 0;}
  .cert .track{color:var(--navy);font-weight:700;}
  .cert .dates{font-size:13px;color:#6b7280;margin-top:14px;}
  .cert .footer{display:flex;justify-content:space-between;margin-top:34px;font-size:12.5px;color:#6b7280;}

  .downloadBtn{margin-top:16px;width:100%;background:var(--navy);color:#fff;border:none;
    border-radius:10px;padding:12px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:15px;cursor:pointer;}
  .msg{margin-top:10px;font-size:13.5px;padding:10px;border-radius:8px;background:#fdecec;color:#9c2b2b;display:none;}
</style>
</head>
<body>
<main>
  <div class="lookup">
    <label style="font-size:13px;color:#6b7280;">أدخل كود الشهادة للتحقق أو العرض</label>
    <input type="text" id="codeInput" placeholder="مثال: INV-2026-XXXX">
    <button onclick="lookup()">عرض الشهادة</button>
    <div class="msg" id="errMsg"></div>
  </div>

  <div id="certWrap">
    <div class="cert" id="certNode">
      <div class="eyebrow">جامعة القصيم · مركز الابتكار والملكية الفكرية</div>
      <h1>شهادة إتمام تدريب</h1>
      <div class="gold-rule"></div>
      <div class="grants">تشهد إدارة برنامج صيف الابتكار 2026 بأن</div>
      <div class="name" id="cName"></div>
      <div class="desc">قد أتمّ بنجاح متطلبات مسار <span class="track" id="cTrack"></span> ضمن البرنامج التدريبي "صيف الابتكار" المقام في معمل كود جامعة القصيم.</div>
      <div class="dates" id="cDates"></div>
      <div class="footer">
        <span>Innovation Summer 2026</span>
        <span id="cCode"></span>
      </div>
    </div>
    <button class="downloadBtn" onclick="downloadPdf()">تحميل الشهادة PDF</button>
  </div>
</main>

<script src="config.js"></script>
<script>
function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

async function lookup(){
  const code = (document.getElementById('codeInput').value || getParam('code') || '').trim();
  const errMsg = document.getElementById('errMsg');
  errMsg.style.display = 'none';
  if(!code) return;

  const { data, error } = await supabaseClient.rpc('get_certificate', { p_code: code });
  if(error || !data || !data.length){
    errMsg.textContent = 'لم يتم العثور على شهادة بهذا الكود';
    errMsg.style.display = 'block';
    document.getElementById('certWrap').classList.remove('show');
    return;
  }
  const c = data[0];
  document.getElementById('cName').textContent = c.full_name;
  document.getElementById('cTrack').textContent = c.track_name;
  document.getElementById('cDates').textContent = formatRange(c.day1_date, c.day3_date);
  document.getElementById('cCode').textContent = code;
  document.getElementById('certWrap').classList.add('show');
}

function formatRange(d1, d3){
  const opts = {day:'numeric', month:'long', year:'numeric'};
  const a = new Date(d1).toLocaleDateString('ar-SA', opts);
  const b = new Date(d3).toLocaleDateString('ar-SA', opts);
  return `${a} — ${b}`;
}

async function downloadPdf(){
  const node = document.getElementById('certNode');
  const canvas = await html2canvas(node, { scale: 3, backgroundColor: '#fffdf7' });
  const img = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width, canvas.height] });
  pdf.addImage(img, 'PNG', 0, 0, canvas.width, canvas.height);
  pdf.save('شهادة-صيف-الابتكار.pdf');
}

// تحميل تلقائي إذا جاء الكود عبر رابط QR
if(getParam('code')){
  document.getElementById('codeInput').value = getParam('code');
  lookup();
}
</script>
</body>
</html>
