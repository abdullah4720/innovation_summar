<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الحضور | صيف الابتكار 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{--navy:#0B1B3F;--gold:#E7B10A;--cream:#FBF6E9;--ink:#1c2230;--line:#e7ddc0;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'IBM Plex Sans Arabic',sans-serif;}
  h1,h2,.display{font-family:'Tajawal',sans-serif;}
  .topbar{background:var(--navy);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
  .topbar h1{font-size:19px;margin:0;}
  main{max-width:520px;margin:24px auto;padding:0 16px 60px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px;
    box-shadow:0 8px 24px rgba(11,27,63,.06);}
  input{width:100%;padding:12px;border:1.5px solid #dcd3b8;border-radius:10px;font-size:15px;font-family:inherit;}
  button{font-family:'Tajawal',sans-serif;font-weight:700;border:none;border-radius:10px;padding:12px 16px;cursor:pointer;font-size:15px;}
  .btn-gold{background:var(--gold);color:var(--navy);width:100%;}
  .btn-outline{background:#fff;border:1.5px solid var(--navy);color:var(--navy);width:100%;margin-top:8px;}
  #reader{width:100%;border-radius:12px;overflow:hidden;}
  .hide{display:none;}
  .pname{font-size:20px;font-weight:700;color:var(--navy);}
  .ptrack{color:#6b7280;font-size:14px;margin-top:2px;}
  .days{display:flex;gap:8px;margin-top:16px;}
  .day-pill{flex:1;text-align:center;padding:8px 4px;border-radius:10px;font-size:12.5px;font-weight:600;border:1.5px solid #dcd3b8;color:#6b7280;}
  .day-pill.today{border-color:var(--gold);}
  .day-buttons{display:flex;gap:6px;justify-content:center;margin-top:6px;}
  .day-btn{border:1.5px solid #dcd3b8;background:#fff;color:#9ca3af;border-radius:8px;
    width:32px;height:28px;font-size:13px;font-weight:700;cursor:pointer;}
  .day-btn.present.active{background:#1e7a3f;border-color:#1e7a3f;color:#fff;}
  .day-btn.absent.active{background:#c0392b;border-color:#c0392b;color:#fff;}
  .msg{margin-top:12px;font-size:13.5px;padding:10px;border-radius:8px;}
  .msg.ok{background:#e8f6ec;color:#1e7a3f;}
  .msg.err{background:#fdecec;color:#9c2b2b;}
  .manual{margin-top:10px;}
  .name-result{padding:8px 10px;border:1px solid #e7ddc0;border-radius:8px;margin-top:6px;cursor:pointer;font-size:13.5px;}
  .name-result:hover{background:#fffdf3;}
  .name-result .nr-track{color:#6b7280;font-size:12px;}
</style>
</head>
<body>
<div class="topbar">
  <h1>تسجيل الحضور — صيف الابتكار</h1>
  <span id="whoami" style="font-size:13px;opacity:.85;"></span>
</div>

<main>
  <!-- تسجيل دخول الموظف -->
  <div class="card" id="loginCard">
    <h2 style="margin-top:0;">تسجيل دخول فريق الإدارة</h2>
    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" style="margin-bottom:10px;">
    <input type="password" id="loginPass" placeholder="كلمة المرور">
    <button class="btn-gold" style="margin-top:14px;" onclick="login()">دخول</button>
    <div class="msg err hide" id="loginErr"></div>
  </div>

  <!-- الماسح -->
  <div id="scanArea" class="hide">
    <div class="card">
      <label style="font-size:14px;font-weight:700;color:var(--navy);">ابحث بالاسم</label>
      <input type="text" id="nameSearch" placeholder="اكتب اسم المشارك..." oninput="searchByName()" style="margin-top:8px;">
      <div id="nameResults" style="margin-top:8px;"></div>

      <details style="margin-top:16px;">
        <summary style="cursor:pointer;font-size:13px;color:#6b7280;">لديه رمز QR؟ اضغط هنا لمسحه أو إدخاله يدويًا</summary>
        <div id="reader" style="margin-top:10px;"></div>
        <div class="manual">
          <label style="font-size:13px;color:#6b7280;">أو أدخل الرمز يدويًا</label>
          <input type="text" id="manualCode" placeholder="qr token">
          <button class="btn-outline" onclick="lookupManual()">بحث</button>
        </div>
      </details>
    </div>

    <div class="card hide" id="resultCard">
      <div class="pname" id="rName"></div>
      <div class="ptrack" id="rTrack"></div>
      <div class="days" id="rDays"></div>
      <div class="msg hide" id="resultMsg"></div>
      <button class="btn-outline" style="margin-top:14px;" onclick="resetScan()">مسح مشارك آخر</button>
    </div>
  </div>
</main>

<script src="config.js"></script>
<script>
let currentParticipant = null;
let currentTrack = null;
let html5QrCode = null;

let myRole = null;

supabaseClient.auth.onAuthStateChange(async (event, session) => {
  if(session){
    document.getElementById('loginCard').classList.add('hide');
    document.getElementById('scanArea').classList.remove('hide');
    document.getElementById('whoami').textContent = session.user.email;

    const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', session.user.id).single();
    myRole = profile ? profile.role : null;

    // نشغّل الكاميرا فقط لما المستخدم يفتح قسم "لديه رمز QR"، حتى لا تفشل داخل عنصر details مغلق
    const detailsEl = document.querySelector('#scanArea details');
    if(detailsEl){
      detailsEl.addEventListener('toggle', () => {
        if(detailsEl.open && !html5QrCode) startScanner();
      });
    }
  }
});

async function login(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const errBox = document.getElementById('loginErr');
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if(error){ errBox.textContent = 'بيانات الدخول غير صحيحة'; errBox.classList.remove('hide'); }
}

function startScanner(){
  html5QrCode = new Html5Qrcode("reader");
  Html5Qrcode.getCameras().then(cams => {
    if(!cams.length) return;
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 240 },
      (decodedText) => { handleCode(decodedText); html5QrCode.pause(); },
      () => {}
    );
  }).catch(()=>{});
}

function lookupManual(){
  const code = document.getElementById('manualCode').value.trim();
  if(code) handleCode(code);
}

let searchTimer = null;
function searchByName(){
  clearTimeout(searchTimer);
  const q = document.getElementById('nameSearch').value.trim();
  const box = document.getElementById('nameResults');
  if(q.length < 2){ box.innerHTML = ''; return; }

  searchTimer = setTimeout(async () => {
    const { data, error } = await supabaseClient
      .from('participants')
      .select('*, tracks(*)')
      .ilike('full_name', `%${q}%`)
      .limit(8);

    if(error || !data || !data.length){
      box.innerHTML = '<div style="color:#9ca3af;font-size:13px;padding:6px;">لا يوجد نتائج</div>';
      return;
    }
    box.innerHTML = data.map((p, i) => `
      <div class="name-result" onclick="selectFromSearch(${i})">
        ${p.full_name}
        <div class="nr-track">${p.tracks ? p.tracks.name_ar : ''}</div>
      </div>
    `).join('');
    window._searchResults = data;
  }, 250);
}

function selectFromSearch(i){
  const data = window._searchResults[i];
  currentParticipant = data;
  currentTrack = data.tracks;
  document.getElementById('nameResults').innerHTML = '';
  document.getElementById('nameSearch').value = '';
  renderParticipant(true);
}

async function handleCode(token){
  const { data, error } = await supabaseClient
    .from('participants')
    .select('*, tracks(*)')
    .eq('qr_token', token)
    .single();

  if(error || !data){
    showResultMsg('لم يتم العثور على مشارك بهذا الرمز', false);
    return;
  }
  currentParticipant = data;
  currentTrack = data.tracks;
  renderParticipant(true);
}

function renderParticipant(autoMarkToday){
  document.getElementById('resultCard').classList.remove('hide');
  document.getElementById('rName').textContent = currentParticipant.full_name;
  document.getElementById('rTrack').textContent = currentTrack.name_ar;

  const todayStr = new Date().toISOString().slice(0,10);
  const dayDates = [currentTrack.day1_date, currentTrack.day2_date, currentTrack.day3_date];

  // عند المسح لأول مرة، إذا اليوم الحالي يطابق أحد أيام المسار وهو اليوم المفعّل ولم يُحدَّد بعد، نعتبره حاضرًا تلقائيًا
  if(autoMarkToday){
    const todayIdx = dayDates.findIndex(d => d === todayStr);
    const dayIsActive = myRole === 'admin' || currentTrack.active_day === (todayIdx + 1);
    if(todayIdx > -1 && dayIsActive && currentParticipant[`day${todayIdx+1}_attended`] == null){
      setDay(todayIdx + 1, true, true);
      return; // setDay سيعيد الرسم بعد التحديث
    }
  }

  const daysHtml = dayDates.map((d, i) => {
    const isToday = d === todayStr;
    const val = currentParticipant[`day${i+1}_attended`];
    const isActive = myRole === 'admin' || currentTrack.active_day === (i + 1);
    const disabledAttr = isActive ? '' : 'disabled title="لم يُفعَّل هذا اليوم بعد من المدير"';
    return `<div class="day-pill ${isToday?'today':''}">
      اليوم ${i+1}
      <div class="day-buttons">
        <button class="day-btn present ${val===true?'active':''}" ${disabledAttr} onclick="setDay(${i+1}, true)">✓</button>
        <button class="day-btn absent ${val===false?'active':''}" ${disabledAttr} onclick="setDay(${i+1}, false)">✕</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('rDays').innerHTML = daysHtml;
  document.getElementById('resultMsg').classList.add('hide');
}

async function setDay(dayNum, value, silent){
  if(myRole !== 'admin' && currentTrack.active_day !== dayNum){
    showResultMsg('هذا اليوم غير مفعّل بعد. تواصل مع المدير لتفعيله.', false);
    return;
  }
  const field = `day${dayNum}_attended`;
  const newVal = (currentParticipant[field] === value) ? null : value;
  const { error } = await supabaseClient.from('participants')
    .update({ [field]: newVal }).eq('id', currentParticipant.id);

  if(error){ showResultMsg('تعذّر تحديث الحضور', false); return; }
  currentParticipant[field] = newVal;
  renderParticipant(false);
  if(!silent) showResultMsg(newVal === true ? 'تم تسجيل الحضور ✅' : (newVal === false ? 'تم تسجيله كغائب' : 'تم إلغاء التحديد'), true);
  else showResultMsg('تم تسجيل الحضور تلقائيًا لليوم الحالي ✅', true);
}

function showResultMsg(text, ok){
  const el = document.getElementById('resultMsg');
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.classList.remove('hide');
}

function resetScan(){
  currentParticipant = null; currentTrack = null;
  document.getElementById('resultCard').classList.add('hide');
  document.getElementById('manualCode').value = '';
  if(html5QrCode) html5QrCode.resume();
}
</script>
</body>
</html>
