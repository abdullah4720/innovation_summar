<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة المشارك | صيف الابتكار 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--navy:#0B1B3F;--gold:#E7B10A;--gold-2:#f7cf4d;--cream:#FBF6E9;--ink:#1c2230;--line:#e7ddc0;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'IBM Plex Sans Arabic',sans-serif;}
  h1,h2,h3,.display{font-family:'Tajawal',sans-serif;}

  .hero{position:relative;background:var(--navy);color:#fff;overflow:hidden;padding:34px 20px 46px;}
  .hero::before, .hero::after{content:"";position:absolute;height:3px;background:var(--gold);width:140%;transform:rotate(-8deg);}
  .hero::before{top:14px;left:-40px;} .hero::after{top:26px;left:-40px;opacity:.5;}
  .hero-inner{position:relative;max-width:640px;margin:0 auto;text-align:center;padding-top:16px;}
  .eyebrow{color:var(--gold-2);font-weight:600;font-size:13px;margin-bottom:4px;}
  .hero h1{font-size:28px;font-weight:900;margin:4px 0 2px;}
  .hero .sub{font-size:14.5px;opacity:.85;}

  main{max-width:640px;margin:-24px auto 60px;padding:0 16px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px;
    box-shadow:0 10px 30px rgba(11,27,63,.07);}
  .card h2{font-size:17px;margin:0 0 12px;color:var(--navy);border-right:4px solid var(--gold);padding-right:10px;}

  label{display:block;font-size:13.5px;font-weight:600;margin:10px 0 5px;color:#132a5c;}
  input{width:100%;padding:12px 14px;border:1.5px solid #dcd3b8;border-radius:10px;font-family:inherit;font-size:15px;background:#fffdf7;}
  input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(231,177,10,.18);}
  button.submit{width:100%;margin-top:16px;background:var(--gold);color:var(--navy);border:none;padding:13px;
    border-radius:10px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:15.5px;cursor:pointer;}
  button.submit:disabled{opacity:.6;cursor:not-allowed;}

  .msg{font-size:13.5px;margin-top:10px;padding:10px 12px;border-radius:8px;display:none;}
  .msg.error{background:#fdecec;color:#9c2b2b;display:block;}

  .hide{display:none !important;}

  .result-name{font-size:22px;font-weight:900;color:var(--navy);text-align:center;}
  .result-track{text-align:center;color:#6b7280;font-size:14px;margin-top:2px;}

  .days{display:flex;gap:8px;margin-top:16px;}
  .day{flex:1;text-align:center;padding:12px 6px;border-radius:12px;font-size:13px;font-weight:700;border:1.5px solid #e5e1cc;}
  .day .lbl{font-size:11.5px;font-weight:600;color:#6b7280;margin-bottom:4px;}
  .day.present{background:#e8f6ec;border-color:#1e7a3f;color:#1e7a3f;}
  .day.absent{background:#fdecec;border-color:#c0392b;color:#c0392b;}
  .day.pending{background:#f5f4ef;color:#9ca3af;}

  .hours-card{margin-top:18px;background:#fffdf7;border:1.5px solid var(--gold);border-radius:14px;padding:16px 18px;}
  .hours-card h3{margin:0 0 4px;font-size:15px;color:var(--navy);font-family:'Tajawal',sans-serif;}
  .hours-card .hint{font-size:12px;color:#6b7280;margin-bottom:12px;}
  .hour-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13.5px;
    border-bottom:1px dashed #e9e3cd;}
  .hour-row:last-of-type{border-bottom:none;}
  .hour-row .hlabel{color:#3a3f4b;font-weight:600;}
  .hour-chip{font-weight:700;font-size:12.5px;padding:3px 10px;border-radius:999px;}
  .hour-chip.earned{background:#e8f6ec;color:#1e7a3f;}
  .hour-chip.zero{background:#fdecec;color:#9c2b2b;}
  .hour-chip.pending{background:#f1f1f1;color:#9ca3af;}

  .hours-total{margin-top:12px;padding-top:12px;border-top:1.5px solid var(--gold);}
  .hours-total .total-line{display:flex;justify-content:space-between;font-weight:700;font-size:14.5px;color:var(--navy);
    font-family:'Tajawal',sans-serif;margin-bottom:8px;}
  .progress-track{background:#f0ead4;border-radius:999px;height:10px;overflow:hidden;}
  .progress-fill{background:var(--gold);height:100%;border-radius:999px;transition:width .4s;}

  .cert-box{margin-top:18px;text-align:center;padding:16px;border-radius:12px;}
  .cert-box.ready{background:#fff9e6;border:1.5px solid var(--gold);}
  .cert-box.notready{background:#f5f4ef;color:#6b7280;}
  .cert-box a.btn{display:inline-block;margin-top:10px;background:var(--navy);color:#fff;text-decoration:none;
    padding:10px 20px;border-radius:10px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:14px;}

  .back-link{display:block;text-align:center;margin-top:6px;color:#6b7280;font-size:13px;cursor:pointer;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="eyebrow">جامعة القصيم · مركز الابتكار والملكية الفكرية</div>
    <h1>بوابة المشارك</h1>
    <div class="sub">صيف الابتكار — Innovation Summer 2026</div>
  </div>
</div>

<main>
  <div class="card" id="lookupCard">
    <h2>تحقق من حالتك</h2>
    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="name@example.com">
    <label>رقم الجوال</label>
    <input type="tel" id="phone" placeholder="05xxxxxxxx">
    <div class="msg error" id="errMsg"></div>
    <button class="submit" id="submitBtn" onclick="lookup()">عرض حالتي</button>
  </div>

  <div class="card hide" id="resultCard">
    <div class="result-name" id="rName"></div>
    <div class="result-track" id="rTrack"></div>

    <div class="days" id="rDays"></div>

    <div class="hours-card" id="hoursCard">
      <h3>ساعات التدريب المسجّلة</h3>
      <div class="hint">3 أيام تدريبية × 4 ساعات يوميًا = 12 ساعة تدريبية كحد أقصى، تُحتسب تلقائيًا حسب حضورك الفعلي</div>
      <div id="hourRows"></div>
      <div class="hours-total">
        <div class="total-line"><span>إجمالي الساعات</span><span id="totalHoursText"></span></div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </div>

    <div id="certBox"></div>

    <span class="back-link" onclick="goBack()">‹ رجوع للبحث مرة أخرى</span>
  </div>
</main>

<script src="config.js"></script>
<script>
async function lookup(){
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const errMsg = document.getElementById('errMsg');
  const btn = document.getElementById('submitBtn');
  errMsg.style.display = 'none';

  if(!email || !phone){ errMsg.textContent = 'أدخل البريد ورقم الجوال المسجَّلين'; errMsg.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'جاري البحث...';
  const { data, error } = await supabaseClient.rpc('get_my_status', { p_email: email, p_phone: phone });
  btn.disabled = false; btn.textContent = 'عرض حالتي';

  if(error || !data || !data.length){
    errMsg.textContent = 'لم يتم العثور على تسجيل بهذا البريد ورقم الجوال. تأكد من صحة البيانات.';
    errMsg.style.display = 'block';
    return;
  }

  renderResult(data[0]);
}

function renderResult(r){
  document.getElementById('lookupCard').classList.add('hide');
  document.getElementById('resultCard').classList.remove('hide');
  document.getElementById('rName').textContent = r.full_name;
  document.getElementById('rTrack').textContent = r.track_name;

  const days = [
    { label: 'اليوم الأول', date: r.day1_date, val: r.day1_attended },
    { label: 'اليوم الثاني', date: r.day2_date, val: r.day2_attended },
    { label: 'اليوم الثالث', date: r.day3_date, val: r.day3_attended },
  ];
  document.getElementById('rDays').innerHTML = days.map(d => {
    const cls = d.val === true ? 'present' : (d.val === false ? 'absent' : 'pending');
    const text = d.val === true ? 'حاضر ✓' : (d.val === false ? 'لم يحضر' : 'قريبًا');
    return `<div class="day ${cls}"><div class="lbl">${d.label}</div>${text}</div>`;
  }).join('');

  const HOURS_PER_DAY = 4;
  const TOTAL_POSSIBLE = days.length * HOURS_PER_DAY;
  let earnedHours = 0;

  document.getElementById('hourRows').innerHTML = days.map(d => {
    const hours = d.val === true ? HOURS_PER_DAY : 0;
    earnedHours += hours;
    const chipClass = d.val === true ? 'earned' : (d.val === false ? 'zero' : 'pending');
    const chipText = d.val === true ? `${hours} ساعات` : (d.val === false ? '0 ساعة' : 'قيد الانتظار');
    return `<div class="hour-row"><span class="hlabel">${d.label}</span><span class="hour-chip ${chipClass}">${chipText}</span></div>`;
  }).join('');

  document.getElementById('totalHoursText').textContent = `${earnedHours} من ${TOTAL_POSSIBLE} ساعة`;
  document.getElementById('progressFill').style.width = `${Math.round(100 * earnedHours / TOTAL_POSSIBLE)}%`;

  const certBox = document.getElementById('certBox');
  if(r.certificate_issued){
    certBox.innerHTML = `
      <div class="cert-box ready">
        🎉 مبروك! شهادتك جاهزة
        <br><a class="btn" href="certificate.html?code=${r.certificate_code}" target="_blank">عرض وتحميل الشهادة</a>
      </div>`;
  } else {
    certBox.innerHTML = `
      <div class="cert-box notready">
        شهادتك لم تصدر بعد. تصدر تلقائيًا بعد اكتمال حضورك للأيام المطلوبة ونهاية المسار.
      </div>`;
  }
}

function goBack(){
  document.getElementById('resultCard').classList.add('hide');
  document.getElementById('lookupCard').classList.remove('hide');
  document.getElementById('email').value = '';
  document.getElementById('phone').value = '';
}
</script>
</body>
</html>
