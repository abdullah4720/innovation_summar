<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإحصائيات العامة | صيف الابتكار 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root{--navy:#0B1B3F;--gold:#E7B10A;--gold-2:#f7cf4d;--cream:#FBF6E9;--ink:#1c2230;--line:#e7ddc0;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'IBM Plex Sans Arabic',sans-serif;}
  h1,h2,h3{font-weight:800;}

  .hero{position:relative;background:var(--navy);color:#fff;overflow:hidden;padding:34px 20px 46px;}
  .hero::before, .hero::after{content:"";position:absolute;height:3px;background:var(--gold);width:140%;transform:rotate(-8deg);}
  .hero::before{top:14px;left:-40px;} .hero::after{top:26px;left:-40px;opacity:.5;}
  .hero-inner{position:relative;max-width:1000px;margin:0 auto;text-align:center;padding-top:16px;}
  .hero h1{font-size:26px;margin:4px 0 2px;}
  .hero .sub{font-size:14.5px;opacity:.85;}

  main{max-width:1000px;margin:-24px auto 60px;padding:0 16px;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;}
  .stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;text-align:center;
    box-shadow:0 8px 24px rgba(11,27,63,.06);}
  .stat .num{font-size:32px;font-weight:800;color:var(--navy);}
  .stat .lbl{font-size:13px;color:#6b7280;margin-top:4px;}

  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:760px){.charts-grid{grid-template-columns:1fr;}}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;}
  .card h3{margin:0 0 12px;font-size:15.5px;color:var(--navy);}
  .loading{text-align:center;color:#9ca3af;padding:40px;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <h1>صيف الابتكار 2026 — الأثر بالأرقام</h1>
    <div class="sub">جامعة القصيم · مركز الابتكار والملكية الفكرية</div>
  </div>
</div>

<main>
  <div class="stats-grid" id="statsGrid">
    <div class="loading">جاري تحميل الإحصائيات...</div>
  </div>

  <div class="charts-grid">
    <div class="card"><h3>عدد المشاركين لكل مسار</h3><canvas id="chartTracks"></canvas></div>
  </div>
</main>

<script src="config.js"></script>
<script>
async function loadStats(){
  const { data: statsData } = await supabaseClient.rpc('get_public_stats');
  const s = (statsData && statsData[0]) || {};

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat"><div class="num">${s.total_participants ?? 0}</div><div class="lbl">إجمالي المشاركين</div></div>
    <div class="stat"><div class="num">${s.total_hours ?? 0}</div><div class="lbl">ساعة تدريبية مُنجزة</div></div>
    <div class="stat"><div class="num">${s.certificates_issued ?? 0}</div><div class="lbl">شهادة صادرة</div></div>
    <div class="stat"><div class="num">${s.avg_satisfaction ?? '—'}</div><div class="lbl">متوسط رضا المشاركين (5)</div></div>
    <div class="stat"><div class="num">${s.organizations_count ?? 0}</div><div class="lbl">جهة مشاركة</div></div>
  `;

  const { data: dist } = await supabaseClient.rpc('get_track_distribution');
  const labels = (dist || []).map(d => d.track_name);
  const counts = (dist || []).map(d => d.participant_count);

  new Chart(document.getElementById('chartTracks'), {
    type: 'bar',
    data: { labels, datasets: [{ data: counts, backgroundColor: '#E7B10A' }] },
    options: { plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, ticks:{precision:0}}} }
  });
}
loadStats();
</script>
</body>
</html>
