<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استبيان التقييم | صيف الابتكار 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--navy:#0B1B3F;--gold:#E7B10A;--gold-2:#f7cf4d;--cream:#FBF6E9;--ink:#1c2230;--line:#e7ddc0;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'IBM Plex Sans Arabic',sans-serif;}
  h1,h2{font-weight:800;}
  main{max-width:600px;margin:30px auto;padding:0 16px 60px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px;margin-bottom:16px;}
  .card h2{font-size:19px;margin:0 0 4px;color:var(--navy);}
  .card .hint{font-size:13px;color:#6b7280;margin-bottom:16px;}

  label{display:block;font-size:14px;font-weight:600;margin:14px 0 6px;color:#132a5c;}
  input, textarea{width:100%;padding:12px;border:1.5px solid #dcd3b8;border-radius:10px;font-family:inherit;font-size:15px;}
  textarea{resize:vertical;min-height:80px;}

  .stars{display:flex;gap:8px;flex-direction:row-reverse;justify-content:flex-end;}
  .stars input{display:none;}
  .stars label{margin:0;font-size:30px;color:#e2ddc8;cursor:pointer;padding:0;width:auto;}
  .stars input:checked ~ label,
  .stars label:hover, .stars label:hover ~ label{color:var(--gold);}

  button.submit{width:100%;margin-top:20px;background:var(--gold);color:var(--navy);border:none;
    padding:13px;border-radius:10px;font-weight:700;font-size:15.5px;cursor:pointer;}
  button.submit:disabled{opacity:.6;cursor:not-allowed;}

  .msg{font-size:13.5px;margin-top:10px;padding:10px 12px;border-radius:8px;display:none;}
  .msg.error{background:#fdecec;color:#9c2b2b;display:block;}
  .success{display:none;text-align:center;}
  .success.show{display:block;}
  .hide{display:none !important;}
</style>
</head>
<body>
<main>
  <div class="card" id="formCard">
    <h2>استبيان تقييم التدريب</h2>
    <div class="hint">إجابتك تساعدنا نطوّر البرنامج، وهي خطوة أخيرة قبل إصدار شهادتك.</div>

    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="name@example.com">
    <label>رقم الجوال</label>
    <input type="tel" id="phone" placeholder="05xxxxxxxx">

    <label>تقييمك لمحتوى التدريب</label>
    <div class="stars" id="s1"></div>

    <label>تقييمك للمدرب/الميسّر</label>
    <div class="stars" id="s2"></div>

    <label>تقييمك للتنظيم والمرافق</label>
    <div class="stars" id="s3"></div>

    <label>تقييمك العام للتجربة</label>
    <div class="stars" id="s4"></div>

    <label>ملاحظات أو مقترحات (اختياري)</label>
    <textarea id="comment" placeholder="شاركنا رأيك بحرية..."></textarea>

    <div class="msg error" id="errMsg"></div>
    <button class="submit" id="submitBtn" onclick="submitEvaluation()">إرسال التقييم</button>
  </div>

  <div class="card success" id="successCard">
    <h2>✅ شكرًا لك!</h2>
    <p style="color:#4b5563;">تم استلام تقييمك بنجاح. يمكنك الآن الرجوع لبوابة المشارك لمتابعة حالة شهادتك.</p>
    <a href="participant.html" style="display:block;text-align:center;margin-top:14px;background:var(--navy);
      color:#fff;text-decoration:none;padding:12px;border-radius:10px;font-weight:700;">فتح بوابة المشارك</a>
  </div>
</main>

<script src="config.js"></script>
<script>
function buildStars(containerId){
  const el = document.getElementById(containerId);
  let html = '';
  for(let i = 5; i >= 1; i--){
    html += `<input type="radio" name="${containerId}" id="${containerId}_${i}" value="${i}">
             <label for="${containerId}_${i}">★</label>`;
  }
  el.innerHTML = html;
}
['s1','s2','s3','s4'].forEach(buildStars);

function getRating(containerId){
  const checked = document.querySelector(`input[name="${containerId}"]:checked`);
  return checked ? parseInt(checked.value, 10) : null;
}

async function submitEvaluation(){
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const comment = document.getElementById('comment').value.trim();
  const errMsg = document.getElementById('errMsg');
  const btn = document.getElementById('submitBtn');
  errMsg.style.display = 'none';

  const content = getRating('s1'), trainer = getRating('s2'), org = getRating('s3'), overall = getRating('s4');

  if(!email || !phone){ errMsg.textContent = 'أدخل البريد ورقم الجوال المسجَّلين'; errMsg.style.display = 'block'; return; }
  if(!content || !trainer || !org || !overall){ errMsg.textContent = 'الرجاء تقييم جميع المحاور (المحتوى، المدرب، التنظيم، التقييم العام)'; errMsg.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'جاري الإرسال...';
  const { error } = await supabaseClient.rpc('submit_evaluation', {
    p_email: email, p_phone: phone,
    p_content: content, p_trainer: trainer, p_org: org, p_overall: overall,
    p_comment: comment || null
  });
  btn.disabled = false; btn.textContent = 'إرسال التقييم';

  if(error){
    errMsg.textContent = error.message.includes('لم يتم العثور')
      ? 'لم يتم العثور على تسجيل بهذا البريد ورقم الجوال. تأكد من صحة البيانات.'
      : 'تعذّر إرسال التقييم، حاول مرة أخرى.';
    errMsg.style.display = 'block';
    return;
  }

  document.getElementById('formCard').classList.add('hide');
  document.getElementById('successCard').classList.add('show');
}
</script>
</body>
</html>
